<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Glow du Soir Admin</title>
<style>
body{margin:0;font-family:Inter,Arial,sans-serif;background:#f5f5f5;color:#1f2933}.top{background:#f85606;color:#fff;padding:18px 24px;display:flex;justify-content:space-between;align-items:center}.wrap{max-width:1180px;margin:0 auto;padding:22px}.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:18px;box-shadow:0 1px 3px rgba(16,24,40,.08);margin-bottom:18px}.login{max-width:420px;margin:80px auto}.login input,.product-row input{width:100%;padding:11px;border:1px solid #d0d5dd;border-radius:7px;box-sizing:border-box}button{background:#f85606;color:#fff;border:0;border-radius:7px;padding:11px 14px;font-weight:700;cursor:pointer}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.stat b{font-size:24px;color:#f85606}.table{width:100%;border-collapse:collapse}.table th,.table td{border-bottom:1px solid #eaecf0;padding:10px;text-align:left;font-size:13px;vertical-align:top}.product-row{display:grid;grid-template-columns:1.3fr .7fr .7fr .6fr .4fr auto auto;gap:8px;align-items:center;margin-bottom:8px}.btn-del{background:#dc2626;font-size:12px;padding:8px 10px}.btn-add{background:#16a34a;margin-top:12px;padding:12px 20px}.add-row{display:grid;grid-template-columns:1.3fr .7fr .7fr .6fr .4fr auto;gap:8px;align-items:center;margin-top:14px;padding-top:14px;border-top:1px solid #e5e7eb}.pill{display:inline-block;padding:4px 8px;background:#fff1e8;color:#f85606;border-radius:99px;font-size:12px;font-weight:700}.muted{color:#667085;font-size:12px}.hidden{display:none}@media(max-width:800px){.stats{grid-template-columns:1fr 1fr}.product-row{grid-template-columns:1fr}.top{display:block}.wrap{padding:12px}.table{font-size:12px}}
</style></head><body>
<div id="login" class="login card"><h2>Admin Login</h2><p class="muted">Login to manage products, orders, visits, and sales records.</p><form onsubmit="login(event)"><p><input id="u" placeholder="Username:" required></p><p><input id="p" type="password" placeholder="Password" required></p><button>Login</button><p id="loginMsg" class="muted"></p></form></div>
<div id="app" class="hidden"><div class="top"><div><strong>Glow du Soir Admin</strong><div class="muted" style="color:#ffe7dc">Products • Orders • Visits • Sales</div></div><button onclick="logout()" style="background:#fff;color:#f85606">Logout</button></div><div class="wrap">
  <div class="stats"><div class="card stat">Total Visits<br><b id="visits">0</b></div><div class="card stat">Total Sales<br><b id="sales">0tk</b></div><div class="card stat">Orders<br><b id="ordersCount">0</b></div><div class="card stat">Products<br><b id="productsCount">0</b></div></div>
  <div class="card"><h3>Records</h3><div class="muted" id="records"></div></div>
  <div class="card"><h3>Products</h3><div id="products"></div></div>
  <div class="card"><h3>Orders</h3><div style="overflow:auto"><table class="table"><thead><tr><th>Order</th><th>Customer</th><th>Address</th><th>Items</th><th>Payment</th><th>Total</th></tr></thead><tbody id="orders"></tbody></table></div></div>
</div></div>
<script>
let token=localStorage.getItem('gdsAdminToken')||'';
async function api(url,opt={}){opt.headers={...(opt.headers||{}),'Content-Type':'application/json','x-admin-token':token};const r=await fetch(url,opt);const d=await r.json();if(!r.ok)throw new Error(d.error||'Error');return d;}
async function login(e){e.preventDefault();try{const r=await fetch('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u.value,password:p.value})});const d=await r.json();if(!r.ok)throw new Error(d.error);token=d.token;localStorage.setItem('gdsAdminToken',token);showApp();}catch(err){loginMsg.textContent=err.message;}}
function logout(){localStorage.removeItem('gdsAdminToken');location.reload();}
function showApp(){document.getElementById('login').classList.add('hidden');document.getElementById('app').classList.remove('hidden');load();}
function money(n){return (Number(n)||0)+'tk'}
function recordText(obj){return Object.entries(obj||{}).slice(-8).map(([k,v])=>`${k}: ${v}`).join(' • ')||'No records yet';}
async function load(){try{const d=await api('/api/admin/stats');visits.textContent=d.visits.total||0;sales.textContent=money(d.sales.total);ordersCount.textContent=d.orders.length;productsCount.textContent=d.products.length;records.innerHTML='<b>Visits by day:</b> '+recordText(d.visits.byDay)+'<br><b>Sales by day:</b> '+recordText(d.sales.byDay)+'<br><b>Sales by month:</b> '+recordText(d.sales.byMonth)+'<br><b>Sales by year:</b> '+recordText(d.sales.byYear);products.innerHTML=d.products.map(p=>`<div class="product-row"><input id="name-${p.id}" value="${p.name}"><input id="brand-${p.id}" value="${p.brand}"><input id="cat-${p.id}" value="${p.category}"><input id="price-${p.id}" value="${p.price}"><input id="stock-${p.id}" value="${p.stock}"><button onclick="saveProduct('${p.id}')">Save</button><button class="btn-del" onclick="deleteProduct('${p.id}','${p.name.replace(/'/g,"\\'")}')">Delete</button></div>`).join('')+'<div class="add-row"><input id="new-name" placeholder="Product name"><input id="new-brand" placeholder="Brand"><input id="new-cat" placeholder="Category" value="Skincare"><input id="new-price" placeholder="Price (e.g. 750tk)"><input id="new-stock" placeholder="Stock" value="50"><button class="btn-add" onclick="addProduct()">+ Add Product</button></div>';orders.innerHTML=d.orders.map(o=>`<tr><td><b>${o.id}</b><br><span class="muted">${new Date(o.createdAt).toLocaleString()}</span><br><span class="pill">${o.status}</span></td><td>${o.customer.fullName}<br>${o.customer.mobile}</td><td>${o.customer.address}<br>${o.customer.area}, ${o.customer.thana}<br>${o.customer.district} ${o.customer.postalCode}</td><td>${o.items.map(i=>`${i.name} × ${i.qty}`).join('<br>')}</td><td>bKash: ${o.payment.bkashNumber}<br>TrxID: ${o.payment.trxId}</td><td><b>${o.total}tk</b><br><span class="muted">Delivery ${o.delivery}tk</span></td></tr>`).join('')||'<tr><td colspan="6">No orders yet.</td></tr>';}catch(e){if(token){alert(e.message);}}}
async function saveProduct(id){await api('/api/admin/products/'+id,{method:'PUT',body:JSON.stringify({name:document.getElementById('name-'+id).value,brand:document.getElementById('brand-'+id).value,category:document.getElementById('cat-'+id).value,price:document.getElementById('price-'+id).value,stock:document.getElementById('stock-'+id).value})});alert('Saved');load();}
async function deleteProduct(id,name){if(!confirm('Delete "'+name+'"? This cannot be undone.'))return;await api('/api/admin/products/'+id,{method:'DELETE'});alert('Deleted');load();}
async function addProduct(){const n=document.getElementById('new-name').value;const pr=document.getElementById('new-price').value;if(!n||!pr){alert('Name and price are required');return;}await api('/api/admin/products',{method:'POST',body:JSON.stringify({name:n,brand:document.getElementById('new-brand').value,category:document.getElementById('new-cat').value,price:pr,stock:document.getElementById('new-stock').value})});alert('Product added!');load();}
if(token)showApp();
</script></body></html>
